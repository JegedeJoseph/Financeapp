# ============================================
# BASE CONFIG — applies to ALL profiles
# ============================================
spring:
  application:
    name: personal-finance-manager

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    mapper:
      accept-case-insensitive-enums: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}
    api-key: ${ML_API_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.financeapp: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

kind: Application

---
# ============================================
# LOCAL / DEFAULT PROFILE — H2 in-memory DB
# ============================================
spring:
  config:
    activate:
      on-profile: default

  datasource:
    url: jdbc:h2:mem:finance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

kind: Application

---
# ============================================
# RENDER / PRODUCTION PROFILE — PostgreSQL
# ============================================
spring:
  config:
    activate:
      on-profile: prod   # matches SPRING_PROFILES_ACTIVE=render

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

kind: Application


---
# Lightsail profile – same as Render, but you can override specific things if needed
spring:
  config:
    activate:
      on-profile: lightsail
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

kind: Application